apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: pip
spec:
  workspaces:
    - name: source
  steps:
    - name: pipinstall
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e

        echo "****** Environment ******"
        python3 --version
        pip3 --version
        pwd

        echo "****** Installing Python Requirements ******"
        pip3 install -r requirements.txt
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: unittest
spec:
  workspaces:
    - name: source
  steps:
    - name: unittesttests
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e

        echo "****** Running Python Unit Tests ******"
        python3 -m unittest discover -s . -p "test_app.py"